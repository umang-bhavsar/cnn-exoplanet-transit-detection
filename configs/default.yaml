# Exoplanet transit detector — default configuration

data:
  mission: Kepler
  flux_column: pdcsap_flux
  sequence_length: 2048
  local_view_length: 256
  use_local_view: false

download:
  # CONFIRMED vs FALSE POSITIVE from KOI catalog
  positive_label: CONFIRMED
  negative_label: FALSE POSITIVE
  max_per_class: 40        # increase for better model (e.g. 80 / 400)
  max_total: 200
  flux_quality: pdcsap
  cache_dir: data/raw

preprocess:
  bls_period_min: 0.5
  bls_period_max: 30.0
  bls_period_step: 0.002
  sigma_clip: 5.0
  use_catalog_period: true   # use KOI period when available
  output_dir: data/processed

model:
  in_channels: 1
  channels: [32, 64, 128]
  kernel_sizes: [7, 5, 3]
  dropout: 0.3

train:
  batch_size: 16
  epochs: 40
  learning_rate: 0.001
  weight_decay: 0.0001
  focal_gamma: 2.0
  val_fraction: 0.15
  test_fraction: 0.15
  seed: 42
  checkpoint_dir: models
  use_smote: false         # optional baseline augmentation on tabular features

evaluate:
  threshold: 0.5
